name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: node --test packages/*/dist/__tests__/*.test.js

      - name: Publish passwd-lib
        run: npm publish --workspace packages/passwd-lib --provenance 2>&1 | tee /tmp/pub.log || { grep -q 'previously published' /tmp/pub.log && exit 0; exit 1; }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish passwd-mcp
        run: npm publish --workspace packages/passwd-mcp --provenance 2>&1 | tee /tmp/pub.log || { grep -q 'previously published' /tmp/pub.log && exit 0; exit 1; }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish passwd-cli
        run: npm publish --workspace packages/passwd-cli --provenance 2>&1 | tee /tmp/pub.log || { grep -q 'previously published' /tmp/pub.log && exit 0; exit 1; }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish passwd-agent-cli
        run: npm publish --workspace packages/passwd-agent-cli --provenance 2>&1 | tee /tmp/pub.log || { grep -q 'previously published' /tmp/pub.log && exit 0; exit 1; }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-mcpb:
    runs-on: macos-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build

      - name: Build .mcpb
        run: bash packages/passwd-mcpb/build.sh

      - name: Upload .mcpb artifact
        uses: actions/upload-artifact@v4
        with:
          name: passwd.mcpb
          path: packages/passwd-mcpb/passwd.mcpb

  release-mcpb:
    runs-on: ubuntu-latest
    needs: build-mcpb
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download .mcpb artifact
        uses: actions/download-artifact@v4
        with:
          name: passwd.mcpb

      - name: Attach .mcpb to release
        uses: softprops/action-gh-release@v2
        with:
          files: passwd.mcpb
